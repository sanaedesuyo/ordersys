spring:
  application:
    name: ordersys
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ordersys?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:ordersys}
    password: ${DB_PASSWORD:ordersys123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:ordersys-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration-ms: 86400000
